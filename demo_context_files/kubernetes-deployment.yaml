apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-worker
  labels:
    app: analytics
spec:
  replicas: 3
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
      - name: worker
        image: analytics-worker:v1.2.4
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"   # Susceptible to OOM if workload spikes
            cpu: "1000m"
        env:
        - name: NODE_ENV
          value: "production"
